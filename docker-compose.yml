version: '3.8'

services:
  # 智能体服务
  agent:
    build: .
    container_name: simplecal-agent
    ports:
      - "8000:8000"
    environment:
      - COZE_WORKSPACE_PATH=/app
      - COZE_INTEGRATION_MODEL_BASE_URL=${COZE_INTEGRATION_MODEL_BASE_URL}
      - COZE_WORKLOAD_IDENTITY_API_KEY=${COZE_WORKLOAD_IDENTITY_API_KEY}
    volumes:
      - ./config:/app/config:ro
      - ./assets:/app/assets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 游戏服务器（HTTP）
  game-server:
    image: python:3.12-slim
    container_name: simplecal-game-server
    working_dir: /app
    command: python -m http.server 8080
    ports:
      - "8080:8080"
    volumes:
      - ./assets:/app/assets:ro
    restart: unless-stopped

networks:
  default:
    name: simplecal-network
