<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简便运算大挑战 - 闪电老师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        h2 {
            text-align: center;
            color: #764ba2;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn-easy {
            background: #4CAF50;
        }
        
        .btn-medium {
            background: #FF9800;
        }
        
        .btn-hard {
            background: #f44336;
        }
        
        .difficulty-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .question {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            padding: 25px;
            background: #f0f0f0;
            border-radius: 15px;
            text-align: center;
        }
        
        .answer-section {
            margin: 20px 0;
        }
        
        .answer-label {
            display: block;
            margin: 15px 0 8px;
            font-weight: bold;
            color: #555;
            font-size: 16px;
        }
        
        select, input, textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            font-weight: bold;
            color: #667eea;
        }
        
        .score-display {
            text-align: center;
            font-size: 20px;
            color: #667eea;
            margin: 20px 0;
            padding: 15px;
            background: #e8f0fe;
            border-radius: 10px;
        }
        
        .result-section {
            text-align: center;
        }
        
        .final-score {
            font-size: 48px;
            color: #667eea;
            margin: 20px 0;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .result-details {
            margin: 20px 0;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: left;
        }
        
        .feedback {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .feedback.correct {
            background: #d4edda;
            color: #155724;
        }
        
        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
        }
        
        .timer {
            font-size: 18px;
            color: #667eea;
            text-align: center;
            margin: 10px 0;
        }
        
        .explanation {
            padding: 20px;
            margin: 15px 0;
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            border-radius: 8px;
            display: none;
            font-size: 15px;
            line-height: 1.8;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .stars {
            text-align: center;
            font-size: 30px;
            margin: 10px 0;
        }
        
        .character {
            font-size: 60px;
            text-align: center;
            margin: 10px 0;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始界面 -->
        <div id="start-section" class="section active">
            <div class="character">⚡</div>
            <h1>🎮 简便运算大挑战</h1>
            <h2>闪电老师带你学习简便运算！</h2>
            <p style="text-align: center; margin: 20px 0; font-size: 18px; color: #666;">
                选择难度开始游戏，每关10道题，看看你能得多少分！<br>
                答对+10分，答错-5分
            </p>
            <div class="difficulty-btns">
                <button class="btn btn-easy" onclick="startGame('easy')">简单 (10以内)</button>
                <button class="btn btn-medium" onclick="startGame('medium')">中等 (100以内)</button>
                <button class="btn btn-hard" onclick="startGame('hard')">困难 (1000以内)</button>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <div id="game-section" class="section">
            <div class="progress">
                <span id="question-num">第 1/10 题</span>
                <span id="timer">⏱️ 00:00</span>
            </div>
            <div class="score-display">
                <span>⚡ 闪电老师说：加油！</span>
                <div style="margin-top: 10px;">得分: <strong id="score">0</strong> 分</div>
            </div>
            
            <div class="question" id="question">题目会显示在这里</div>
            
            <div class="answer-section">
                <label class="answer-label">1️⃣ 选择使用的方法：</label>
                <select id="method">
                    <option value="">-- 请选择方法 --</option>
                    <!-- 方法选项将通过 JavaScript 动态生成 -->
                </select>
                
                <label class="answer-label">2️⃣ 列出计算式子：</label>
                <textarea id="formula" rows="3" placeholder="例如：9 + 5 = 9 + 1 + 4 = 10 + 4 = 14"></textarea>
                
                <label class="answer-label">3️⃣ 计算结果：</label>
                <input type="number" id="result" placeholder="输入最终答案" autofocus>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="submitAnswer()">提交答案</button>
                <button class="btn" onclick="skipQuestion()" style="background: #999;">跳过</button>
            </div>
            
            <div id="feedback" class="feedback"></div>
            <div id="explanation" class="explanation"></div>
        </div>
        
        <!-- 结果界面 -->
        <div id="result-section" class="section result-section">
            <div class="character" id="result-character">🏆</div>
            <h1>🎉 游戏结束！</h1>
            <div class="final-score" id="final-score">0 分</div>
            <div class="stars" id="stars"></div>
            <div class="result-details">
                <p><strong>总题数:</strong> <span id="total-questions">0</span></p>
                <p><strong>正确:</strong> <span id="correct-count">0</span></p>
                <p><strong>错误:</strong> <span id="incorrect-count">0</span></p>
                <p><strong>跳过:</strong> <span id="skipped-count">0</span></p>
                <p><strong>用时:</strong> <span id="total-time">00:00</span></p>
                <p><strong>正确率:</strong> <span id="accuracy">0%</span></p>
            </div>
            <button class="btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            difficulty: 'easy',
            currentQuestionIndex: 0,
            questions: [],
            score: 0,
            correctCount: 0,
            incorrectCount: 0,
            skippedCount: 0,
            startTime: null,
            timerInterval: null,
            totalQuestions: 10  // 修改为10道题
        };
        
        // 题目生成器
        const problemGenerator = {
            easy: function() {
                // 简单模式：两位数（10-99）
                return this.generateTwoDigit();
            },

            medium: function() {
                // 中等模式：两位数（10-99）
                return this.generateTwoDigit();
            },

            hard: function() {
                // 困难模式：三位数（100-999）
                return this.generateThreeDigit();
            },

            // 生成两位数题目
            generateTwoDigit: function() {
                const operators = ['+', '-', '×', '÷'];
                const operator = operators[Math.floor(Math.random() * operators.length)];

                let num1, num2, answer;

                switch(operator) {
                    case '+':
                        // 两位数加法
                        num1 = this.randomInt(10, 99);
                        num2 = this.randomInt(10, 99);
                        // 确保结果不超过999
                        while (num1 + num2 > 999) {
                            num1 = this.randomInt(10, 99);
                            num2 = this.randomInt(10, 99);
                        }
                        answer = num1 + num2;
                        break;
                    case '-':
                        // 两位数减法，确保被减数大于减数
                        num1 = this.randomInt(10, 99);
                        num2 = this.randomInt(10, 99);
                        while (num1 <= num2) {
                            num1 = this.randomInt(10, 99);
                            num2 = this.randomInt(10, 99);
                        }
                        answer = num1 - num2;
                        break;
                    case '×':
                        // 两位数乘法
                        num1 = this.randomInt(10, 99);
                        num2 = this.randomInt(2, 20);
                        // 确保结果不超过999
                        while (num1 * num2 > 999) {
                            num1 = this.randomInt(10, 50);
                            num2 = this.randomInt(2, 10);
                        }
                        answer = num1 * num2;
                        break;
                    case '÷':
                        // 两位数除法
                        // 先生成除数和商，再计算被除数
                        num2 = this.randomInt(2, 20);
                        answer = this.randomInt(2, 50);
                        // 确保被除数不超过999
                        while (num2 * answer > 999) {
                            num2 = this.randomInt(2, 10);
                            answer = this.randomInt(2, 99);
                        }
                        num1 = num2 * answer;
                        // 确保被除数是两位数或以上
                        while (num1 < 10) {
                            num2 = this.randomInt(10, 20);
                            answer = this.randomInt(2, 10);
                            num1 = num2 * answer;
                        }
                        break;
                }

                return {
                    question: `${num1} ${operator} ${num2}`,
                    answer: answer,
                    method: this.getRandomMethod(operator),
                    operator: operator,
                    explanation: this.getExplanation(`${num1} ${operator} ${num2}`, answer, this.getRandomMethod(operator))
                };
            },

            // 生成三位数题目
            generateThreeDigit: function() {
                const operators = ['+', '-', '×', '÷'];
                const operator = operators[Math.floor(Math.random() * operators.length)];

                let num1, num2, answer;

                switch(operator) {
                    case '+':
                        // 三位数加法
                        num1 = this.randomInt(100, 999);
                        num2 = this.randomInt(100, 999);
                        // 确保结果不超过999
                        while (num1 + num2 > 999) {
                            num1 = this.randomInt(100, 800);
                            num2 = this.randomInt(100, 199);
                        }
                        answer = num1 + num2;
                        break;
                    case '-':
                        // 三位数减法，确保被减数大于减数
                        num1 = this.randomInt(100, 999);
                        num2 = this.randomInt(100, 999);
                        while (num1 <= num2) {
                            num1 = this.randomInt(300, 999);
                            num2 = this.randomInt(100, 299);
                        }
                        answer = num1 - num2;
                        break;
                    case '×':
                        // 三位数乘法（简化）
                        num1 = this.randomInt(100, 999);
                        num2 = this.randomInt(2, 10);
                        // 确保结果不超过999
                        while (num1 * num2 > 999) {
                            num1 = this.randomInt(100, 200);
                            num2 = this.randomInt(2, 4);
                        }
                        answer = num1 * num2;
                        break;
                    case '÷':
                        // 三位数除法
                        num2 = this.randomInt(2, 20);
                        answer = this.randomInt(10, 100);
                        // 确保被除数不超过999
                        while (num2 * answer > 999) {
                            num2 = this.randomInt(2, 10);
                            answer = this.randomInt(10, 99);
                        }
                        num1 = num2 * answer;
                        // 确保被除数是三位数
                        while (num1 < 100) {
                            num2 = this.randomInt(10, 20);
                            answer = this.randomInt(10, 50);
                            num1 = num2 * answer;
                        }
                        break;
                }

                return {
                    question: `${num1} ${operator} ${num2}`,
                    answer: answer,
                    method: this.getRandomMethod(operator),
                    operator: operator,
                    explanation: this.getExplanation(`${num1} ${operator} ${num2}`, answer, this.getRandomMethod(operator))
                };
            },

            // 生成随机整数
            randomInt: function(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            },

            // 根据运算符获取随机方法
            getRandomMethod: function(operator) {
                const allMethods = {
                    '+': ['凑十法', '凑整法', '加法交换律', '加法结合律'],
                    '-': ['破十法', '凑整法', '加法交换律', '加法结合律'],
                    '×': ['凑整法', '乘法分配律', '乘法结合律', '乘法交换律'],
                    '÷': ['凑整法', '乘法分配律', '除法分配律', '乘法结合律']
                };
                const methods = allMethods[operator] || ['直接计算'];
                return methods[Math.floor(Math.random() * methods.length)];
            },
            
            // 根据运算符获取可选方法
            getAvailableMethods: function(operator) {
                const allMethods = {
                    '+': ['凑十法', '凑整法', '加法交换律', '加法结合律', '直接计算'],
                    '-': ['破十法', '凑整法', '加法交换律', '加法结合律', '直接计算'],
                    '×': ['凑整法', '乘法分配律', '乘法结合律', '乘法交换律', '直接计算'],
                    '÷': ['凑整法', '乘法分配律', '除法分配律', '乘法结合律', '直接计算']
                };
                return allMethods[operator] || ['直接计算'];
            },
            
            getExplanation: function(question, answer, method) {
                const nums = question.split(/[\+\-\×\÷]/);
                const operator = question.match(/[\+\-\×\÷]/)[0];
                const num1 = parseInt(nums[0]);
                const num2 = parseInt(nums[1]);
                
                switch(method) {
                    case '凑十法':
                        const comp = 10 - num1;
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用凑十法：</strong><br>
                        想想看，怎么才能凑成10呢？<br>
                        ${num1} + ${num2} = ${num1} + (${comp} + ${num2 - comp})<br>
                        = (${num1} + ${comp}) + ${num2 - comp}<br>
                        = 10 + ${num2 - comp}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '破十法':
                        const sub = num1 - 10;
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用破十法：</strong><br>
                        先把10减掉，剩下的再处理<br>
                        ${num1} - ${num2} = (10 - ${num2}) + ${sub}<br>
                        = ${10 - num2} + ${sub}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '加法交换律':
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用加法交换律：</strong><br>
                        交换加数的位置，和不变<br>
                        ${num1} + ${num2} = ${num2} + ${num1}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '乘法分配律':
                        if (num2 % 10 === 0) {
                            const other = num2 / 10;
                            return `<h3>⚡ 闪电老师讲解：</h3>
                            <strong>使用乘法分配律：</strong><br>
                            把${num2}拆分成 ${other} × 10<br>
                            ${num1} × ${num2} = ${num1} × (${other} × 10)<br>
                            = (${num1} × ${other}) × 10<br>
                            = ${num1 * other} × 10<br>
                            = <strong>${answer}</strong>`;
                        }
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用乘法分配律：</strong><br>
                        ${num1} × ${num2}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '乘法结合律':
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用乘法结合律：</strong><br>
                        先计算容易的部分<br>
                        ${num1} × ${num2}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '加法结合律':
                        const compAdd = Math.ceil(num1 / 10) * 10 - num1;
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用加法结合律：</strong><br>
                        凑整十数更容易计算<br>
                        ${num1} + ${num2}<br>
                        = (${num1} + ${compAdd}) + (${num2} - ${compAdd})<br>
                        = ${num1 + compAdd} + ${num2 - compAdd}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '除法分配律':
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用除法分配律：</strong><br>
                        ${num1} ÷ ${num2}<br>
                        = <strong>${answer}</strong>`;
                    
                    case '乘法交换律':
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>使用乘法交换律：</strong><br>
                        交换因数的位置，积不变<br>
                        ${num1} × ${num2} = ${num2} × ${num1}<br>
                        = <strong>${answer}</strong>`;
                    
                    default:
                        return `<h3>⚡ 闪电老师讲解：</h3>
                        <strong>直接计算：</strong><br>
                        ${question}<br>
                        = <strong>${answer}</strong>`;
                }
            }
        };
        
        // 开始游戏
        function startGame(difficulty) {
            gameState.difficulty = difficulty;
            gameState.currentQuestionIndex = 0;
            gameState.questions = [];
            gameState.score = 0;
            gameState.correctCount = 0;
            gameState.incorrectCount = 0;
            gameState.skippedCount = 0;
            gameState.startTime = new Date();
            
            // 生成10道题目
            for (let i = 0; i < gameState.totalQuestions; i++) {
                gameState.questions.push(problemGenerator[difficulty]());
            }
            
            // 显示游戏界面
            document.getElementById('start-section').classList.remove('active');
            document.getElementById('result-section').classList.remove('active');
            document.getElementById('game-section').classList.add('active');
            
            // 开始计时
            startTimer();
            
            // 显示第一题
            showQuestion();
        }
        
        // 动态更新方法选项
        function updateMethodOptions(operator) {
            const methodSelect = document.getElementById('method');
            const availableMethods = problemGenerator.getAvailableMethods(operator);
            
            // 清空现有选项
            methodSelect.innerHTML = '<option value="">-- 请选择方法 --</option>';
            
            // 添加可用方法选项
            availableMethods.forEach(method => {
                const option = document.createElement('option');
                option.value = method;
                option.textContent = method;
                methodSelect.appendChild(option);
            });
        }
        
        // 显示题目
        function showQuestion() {
            const question = gameState.questions[gameState.currentQuestionIndex];
            document.getElementById('question-num').textContent = `第 ${gameState.currentQuestionIndex + 1}/${gameState.totalQuestions} 题`;
            document.getElementById('question').textContent = `${question.question} = ?`;
            document.getElementById('score').textContent = gameState.score;
            
            // 根据运算符动态生成方法选项
            updateMethodOptions(question.operator);
            
            // 清空输入
            document.getElementById('method').value = '';
            document.getElementById('formula').value = '';
            document.getElementById('result').value = '';
            document.getElementById('result').focus();
            
            // 清空反馈
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').textContent = '';
            document.getElementById('explanation').classList.remove('show');
        }
        
        // 提交答案
        function submitAnswer() {
            const method = document.getElementById('method').value;
            const formula = document.getElementById('formula').value.trim();
            const result = document.getElementById('result').value.trim();
            
            if (!method || !formula || !result) {
                alert('请完成所有步骤！\n1. 选择方法\n2. 列出式子\n3. 给出结果');
                return;
            }
            
            const question = gameState.questions[gameState.currentQuestionIndex];
            const userResult = parseInt(result);
            const feedbackEl = document.getElementById('feedback');
            const explanationEl = document.getElementById('explanation');
            
            if (userResult === question.answer) {
                // 答对：+10分
                gameState.score += 10;
                gameState.correctCount++;
                feedbackEl.textContent = '✅ 正确！+10分！闪电老师为你点赞！⚡';
                feedbackEl.className = 'feedback correct';
            } else {
                // 答错：-5分
                gameState.score -= 5;
                gameState.incorrectCount++;
                feedbackEl.textContent = `❌ 错了！-5分。正确答案是：${question.answer}`;
                feedbackEl.className = 'feedback incorrect';
                
                // 显示详细讲解
                explanationEl.innerHTML = question.explanation;
                explanationEl.classList.add('show');
            }
            
            document.getElementById('score').textContent = gameState.score;
            
            // 3秒后显示下一题或结果
            setTimeout(() => {
                gameState.currentQuestionIndex++;
                if (gameState.currentQuestionIndex < gameState.totalQuestions) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 3000);
        }
        
        // 跳过题目
        function skipQuestion() {
            gameState.skippedCount++;
            const feedbackEl = document.getElementById('feedback');
            feedbackEl.textContent = '⏭️ 跳过这道题';
            feedbackEl.className = 'feedback';
            
            setTimeout(() => {
                gameState.currentQuestionIndex++;
                if (gameState.currentQuestionIndex < gameState.totalQuestions) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }
        
        // 显示结果
        function showResult() {
            stopTimer();
            
            document.getElementById('game-section').classList.remove('active');
            document.getElementById('result-section').classList.add('active');
            
            document.getElementById('final-score').textContent = gameState.score + ' 分';
            document.getElementById('total-questions').textContent = gameState.totalQuestions;
            document.getElementById('correct-count').textContent = gameState.correctCount;
            document.getElementById('incorrect-count').textContent = gameState.incorrectCount;
            document.getElementById('skipped-count').textContent = gameState.skippedCount;
            document.getElementById('total-time').textContent = formatTime(Math.floor((new Date() - gameState.startTime) / 1000));
            
            // 计算正确率（排除跳过的题目）
            const answered = gameState.correctCount + gameState.incorrectCount;
            const accuracy = answered > 0 ? Math.round((gameState.correctCount / answered) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            // 显示星星
            const stars = gameState.score >= 80 ? '⭐⭐⭐⭐⭐' :
                         gameState.score >= 60 ? '⭐⭐⭐⭐' :
                         gameState.score >= 40 ? '⭐⭐⭐' :
                         gameState.score >= 20 ? '⭐⭐' : '⭐';
            document.getElementById('stars').textContent = stars;
            
            // 显示角色
            const character = gameState.score >= 80 ? '🏆' :
                             gameState.score >= 60 ? '⚡' :
                             gameState.score >= 40 ? '💪' : '📚';
            document.getElementById('result-character').textContent = character;
        }
        
        // 开始计时
        function startTimer() {
            gameState.startTime = new Date();
            gameState.timerInterval = setInterval(() => {
                const elapsed = Math.floor((new Date() - gameState.startTime) / 1000);
                document.getElementById('timer').textContent = `⏱️ ${formatTime(elapsed)}`;
            }, 1000);
        }
        
        // 停止计时
        function stopTimer() {
            clearInterval(gameState.timerInterval);
        }
        
        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('result-section').classList.remove('active');
            document.getElementById('start-section').classList.add('active');
        }
        
        // 回车提交
        document.getElementById('result').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });
    </script>
</body>
</html>
