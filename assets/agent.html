<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧮 简便运算智能体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .input-container button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .input-container button:active {
            transform: translateY(0);
        }

        .input-container button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing {
            display: inline-block;
            padding: 8px 12px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .settings {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .settings label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .settings input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
        }

        .settings button {
            margin-top: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .settings button:hover {
            background: #5568d3;
        }

        .quick-actions {
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-action {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quick-action:hover {
            background: #e0e0e0;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome-message h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        .welcome-message p {
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .welcome-message .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .welcome-message .feature {
            padding: 15px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .welcome-message .feature .emoji {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome-message .feature span {
            display: block;
            font-size: 13px;
            color: #666;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .header h1 {
                font-size: 20px;
            }
        }

        /* 滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧮 简便运算智能体</h1>
            <p>小学三年级数学学习助手</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <h2>👋 欢迎来到简便运算智能体！</h2>
                <p>我是你的数学学习助手，可以帮助你学习简便运算方法<br>进行练习，或者通过游戏提升你的计算能力！</p>
                <div class="features">
                    <div class="feature">
                        <div class="emoji">🤖</div>
                        <span>智能讲解</span>
                    </div>
                    <div class="feature">
                        <div class="emoji">📝</div>
                        <span>智能练习</span>
                    </div>
                    <div class="feature">
                        <div class="emoji">🎮</div>
                        <span>趣味游戏</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <button class="quick-action" onclick="quickSend('你好')">你好</button>
            <button class="quick-action" onclick="quickSend('讲讲简便运算')">讲讲简便运算</button>
            <button class="quick-action" onclick="quickSend('开始游戏')">开始游戏</button>
            <button class="quick-action" onclick="quickSend('出几道题练习')">出几道题练习</button>
        </div>

        <div class="input-container">
            <input
                type="text"
                id="userInput"
                placeholder="输入你的问题..."
                onkeypress="if(event.key === 'Enter') sendMessage()"
            >
            <button onclick="sendMessage()" id="sendButton">发送</button>
        </div>

        <div class="settings">
            <label for="apiUrl">智能体 API 地址（如果无法连接，请修改此地址）</label>
            <input
                type="text"
                id="apiUrl"
                placeholder="例如：http://localhost:8000"
                value="http://localhost:8000"
            >
            <button onclick="testConnection()">测试连接</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const apiUrlInput = document.getElementById('apiUrl');

        let conversationHistory = [];

        // 从 localStorage 加载 API 地址
        const savedApiUrl = localStorage.getItem('agentApiUrl');
        if (savedApiUrl) {
            apiUrlInput.value = savedApiUrl;
        }

        // 测试连接
        async function testConnection() {
            const apiUrl = apiUrlInput.value.replace(/\/$/, '');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `<div class="message-content">🔍 正在测试连接: ${apiUrl}</div>`;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();

            try {
                const response = await fetch(`${apiUrl}/health`);
                const data = await response.json();
                messageDiv.innerHTML = `<div class="message-content">✅ 连接成功！服务状态: ${data.status}</div>`;
                localStorage.setItem('agentApiUrl', apiUrl);
            } catch (error) {
                messageDiv.innerHTML = `<div class="message-content">❌ 连接失败！请检查 API 地址是否正确。<br>错误: ${error.message}</div>`;
            }
            scrollToBottom();
        }

        // 快速发送
        function quickSend(text) {
            userInput.value = text;
            sendMessage();
        }

        // 发送消息
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 清空输入框
            userInput.value = '';

            // 添加用户消息
            addMessage('user', text);

            // 显示正在输入
            const typingDiv = addTyping();

            try {
                const apiUrl = apiUrlInput.value.replace(/\/$/, '');

                const response = await fetch(`${apiUrl}/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: text })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 移除正在输入
                removeTyping(typingDiv);

                // 添加助手回复
                const reply = data.response || data.output || JSON.stringify(data, null, 2);
                addMessage('assistant', reply);

            } catch (error) {
                // 移除正在输入
                removeTyping(typingDiv);

                // 显示错误信息
                addMessage('assistant', `❌ 连接失败！<br><br>请检查以下几点：<br>1. 智能体服务是否已启动？<br>2. API 地址是否正确？<br>3. 网络连接是否正常？<br><br>错误信息: ${error.message}<br><br>💡 提示：你可以点击下方的"测试连接"按钮检查服务状态。`);
            }
        }

        // 添加消息
        function addMessage(role, content) {
            // 移除欢迎消息（如果存在）
            const welcome = chatContainer.querySelector('.welcome-message');
            if (welcome) {
                welcome.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="message-content">${formatMessage(content)}</div>`;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // 添加正在输入提示
        function addTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
            return typingDiv;
        }

        // 移除正在输入提示
        function removeTyping(typingDiv) {
            if (typingDiv && typingDiv.parentNode) {
                typingDiv.parentNode.removeChild(typingDiv);
            }
        }

        // 格式化消息
        function formatMessage(content) {
            // 处理 JSON
            if (content.startsWith('{')) {
                try {
                    const obj = JSON.parse(content);
                    if (obj.game_link) {
                        return `<strong>🎮 游戏已开始！</strong><br><br>
                                <strong>难度：</strong>${obj.difficulty || '自定义'}<br>
                                <strong>游戏链接：</strong><br>
                                <a href="${obj.game_link}" target="_blank" style="color: #667eea; text-decoration: none;">🔗 点击打开游戏</a><br><br>
                                ${obj.message || ''}`;
                    }
                    return `<pre style="white-space: pre-wrap; word-wrap: break-word; font-size: 13px; margin: 0;">${JSON.stringify(obj, null, 2)}</pre>`;
                } catch (e) {
                    // 不是 JSON，继续处理
                }
            }

            // 处理换行
            content = content.replace(/\n/g, '<br>');

            // 处理链接
            content = content.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color: #667eea;">$1</a>');

            return content;
        }

        // 滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 页面加载时自动测试连接
        window.onload = function() {
            setTimeout(() => {
                testConnection();
            }, 500);
        };
    </script>
</body>
</html>
